version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./node-js-server
      dockerfile: Dockerfile
    container_name: node_backend
    restart: always
    env_file:
      - .env                        
    ports:
      - "3000:3000"
    networks:
      - backend_network
    depends_on:
      - db
    
  frontend:
    build:
      context: ./angular-10-client
      dockerfile: Dockerfile
    container_name: angular_frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - backend_network
    depends_on:
      - backend

networks:
  backend_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
